name: Monthly Analysis Yae (one-time)
on:
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      MODE: yaeyama
      GOOGLE_SHEETS_ID_YAEYAMA: ${{ secrets.GOOGLE_SHEETS_ID_YAEYAMA }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth
      - run: python analyze_monthly.py
