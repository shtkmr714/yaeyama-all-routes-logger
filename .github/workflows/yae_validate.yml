name: Yae WaveOnly Validate (one-time)
on:
  workflow_dispatch:
jobs:
  v:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOOGLE_SHEETS_ID_YAEYAMA: ${{ secrets.GOOGLE_SHEETS_ID_YAEYAMA }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth numpy scipy scikit-learn
      - run: python yae_waveonly_validate.py
