name: Yaeyama Historical Scraper (One-Time)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      GOOGLE_SHEETS_ID_YAEYAMA: ${{ secrets.GOOGLE_SHEETS_ID_YAEYAMA }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml gspread google-auth

      - name: Run historical scraper
        run: python yaeyama_historical_scraper.py
